name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  core-portability:
    name: Core crates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal
      - name: Test backend-neutral crates
        run: cargo test -p logit-loom-core -p logit-loom --all-targets --locked
      - name: Test backend-neutral rustdoc
        run: cargo test -p logit-loom-core -p logit-loom --doc --locked

  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install native build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test all targets
        run: cargo test --workspace --all-targets --locked
      - name: Test rustdoc
        run: cargo test --workspace --doc --locked
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Inspect package contents
        run: make package-list
